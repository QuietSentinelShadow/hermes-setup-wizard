name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      # Electron needs shared libraries + a virtual display on Linux.
      - name: Install Electron runtime deps (Linux)
        if: runner.os == 'Linux'
        run: npx playwright install-deps

      - name: End-to-end tests (Linux, headless via xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e

      - name: End-to-end tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.os }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
