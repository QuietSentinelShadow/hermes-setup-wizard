name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build a release for, e.g. v1.0.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            build: npm run dist:mac
          - os: windows-latest
            name: Windows
            build: npm run dist:win
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build installers
        run: ${{ matrix.build }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          merge-multiple: true
          path: dist

      - name: Resolve tag and extract changelog notes
        id: notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Pull the matching "## <version> ..." section out of CHANGELOG.md
          awk -v ver="$VER" '
            /^## / {
              if (found) exit
              if (index($0, ver)) { found=1; print; next }
            }
            found { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release $TAG" > notes.md
          fi
          echo "Release notes:"; cat notes.md

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }}
          body_path: notes.md
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
          fail_on_unmatched_files: true
